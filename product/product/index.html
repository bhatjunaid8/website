<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - JF Collections</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- Skip Navigation Link for Accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <header class="site-header">
        <div class="header-top">
            <div class="header-left">
                <button type="button" id="menu-toggle" class="menu-toggle" aria-label="Open menu" aria-expanded="false">
                    <span class="menu-icon"></span>
                    <span class="menu-text">Menu</span>
                </button>
            </div>
            <a href="../index.html" class="brand-name-link">
                <h1 class="brand-name">
                    <img src="../images/gemini-bag.png" alt="" class="brand-icon"><span>JF Collections</span>
                </h1>
            </a>
            <div class="header-right">
                <button type="button" id="search-toggle" class="icon-button" aria-label="Search">
                    <span>🔍</span>
                </button>
            </div>
        </div>
        <nav class="slide-menu" id="slide-menu" aria-label="Main navigation">
            <div class="slide-menu-header">
                <button type="button" id="menu-close" class="menu-close" aria-label="Close menu">&times;</button>
            </div>
            <ul class="slide-menu-list">
                <li><a href="../index.html" class="slide-menu-link">Home</a></li>
                <li><a href="../index.html" class="slide-menu-link">Products</a></li>
                <li><a href="../about.html" class="slide-menu-link">About</a></li>
                <li><a href="../contact.html" class="slide-menu-link">Contact</a></li>
            </ul>
        </nav>
        <div class="menu-overlay" id="menu-overlay"></div>
    </header>

    <main class="product-detail-page" id="main-content">
        <div class="container">
            <a href="../index.html" class="back-link" aria-label="Back to product catalog">&larr; Back to Products</a>
            
            <div class="product-detail-container">
                <div class="product-gallery" role="region" aria-label="Product image gallery">
                    <div class="main-image-container">
                        <img id="main-image" src="" alt="" class="main-image" aria-describedby="gallery-instructions">
                        <p id="gallery-instructions" class="sr-only">Use arrow keys to navigate between images</p>
                    </div>
                    <div class="thumbnail-container" id="thumbnail-container" role="group" aria-label="Product image thumbnails">
                        <!-- Thumbnails will be inserted here by JavaScript -->
                    </div>
                </div>

                <div class="product-info">
                    <h2 id="product-name" class="product-name"></h2>
                    <p id="product-price" class="product-price"></p>
                    <p id="product-description" class="product-description"></p>
                    
                    <div class="product-details">
                        <div class="detail-section">
                            <h3>Dimensions</h3>
                            <p id="product-dimensions"></p>
                        </div>
                        
                        <div class="detail-section">
                            <h3>Materials</h3>
                            <ul id="product-materials" class="materials-list"></ul>
                        </div>
                        
                        <div class="detail-section">
                            <h3>Available Colors</h3>
                            <div id="product-colors" class="colors-container"></div>
                        </div>
                        
                        <div class="detail-section" id="care-section" style="display: none;">
                            <h3>Care Instructions</h3>
                            <p id="product-care"></p>
                        </div>
                    </div>
                    
                    <button id="contact-button" class="contact-button" aria-label="Contact us about this product">
                        Contact Us About This Product
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <p class="footer-text">&copy; 2024 JF Collections. All rights reserved.</p>
            <nav class="footer-navigation">
                <ul class="footer-nav-list">
                    <li class="footer-nav-item"><a href="../index.html" class="footer-nav-link">Home</a></li>
                    <li class="footer-nav-item"><a href="../about.html" class="footer-nav-link">About</a></li>
                    <li class="footer-nav-item"><a href="../contact.html" class="footer-nav-link">Contact</a></li>
                </ul>
            </nav>
        </div>
    </footer>

    <script src="../js/navigation.js"></script>
    <script src="../js/productPage.js"></script>
    <script>
        var slideMenu = document.getElementById('slide-menu');
        var menuOverlay = document.getElementById('menu-overlay');
        document.getElementById('menu-toggle').addEventListener('click', function() {
            slideMenu.classList.add('open');
            menuOverlay.classList.add('open');
        });
        function closeMenu() {
            slideMenu.classList.remove('open');
            menuOverlay.classList.remove('open');
        }
        document.getElementById('menu-close').addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);
    </script>
</body>
</html>
